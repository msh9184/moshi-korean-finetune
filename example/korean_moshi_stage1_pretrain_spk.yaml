# -----------------------------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------------------------
data:
  train_data: './data/korean_v4_train.jsonl'
  eval_data: './data/korean_v4_valid.jsonl'
  shuffle: true

# -----------------------------------------------------------------------------
# MODEL PATHS
# -----------------------------------------------------------------------------
moshi_paths:
  hf_repo_id: null  # Set to null when using local paths
  moshi_path: '/path/to/model'
  mimi_path: '/path/to/model'
  tokenizer_path: '/path/to/workspace'
  config_path: '/path/to/model'

# -----------------------------------------------------------------------------
# MODULAR BACKBONE CONFIGURATION
# -----------------------------------------------------------------------------
backbone:
  type: "moshi"
  moshi:
    hidden_dim: 4096          # Moshi 7B hidden dimension
    num_layers: 32            # Number of transformer layers
    num_heads: 32             # Number of attention heads (MHA)
    gradient_checkpointing: true

# -----------------------------------------------------------------------------
# Korean Finetuning Configuration
# -----------------------------------------------------------------------------
korean:
  enable_user_stream: false
  full_duplex_input: true
  initialized_model_path: null

  korean_tokenizer_path: null
  korean_tokenizer_type: 'sentencepiece'
  retain_token_ids: [0, 3, 32000]

  interleaver:
    keep_main_only: true
    keep_and_shift: false
    adaptive_distribute: true
    warn_on_overflow: true
    character_level_interpolation: false
    main_speaker_label: 'SPEAKER_MAIN'

  segment_filtering:
    case_control:
      enabled: true
      allow_case1: true
      allow_case2: true
      allow_case3: false
      allow_case4: false
      allow_case5: false
      min_audio_energy: 0.001
      min_audio_presence_ratio: 0.05

    quality:
      enabled: true
      min_moshi_words: 6
      min_moshi_duration_sec: 6.0
      min_moshi_ratio: 0.1
      min_user_words: 0
      min_segment_duration_sec: 10.0
      max_segment_duration_sec: null

    preferences:
      enabled: true
      prefer_moshi_start: false
      prefer_moshi_start_prob: 0.7
      prefer_both_speakers: true
      prefer_both_speakers_prob: 0.5

    role_swapping:
      enabled: true
      probability: 0.2
      swap_audio: true
      swap_text: true
      yield_both: true
      recheck_after_swap: true

    logging:
      enabled: true
      verbosity: 1
      log_first_filter: true
      log_first_pass: true
      log_case_detection: false
      log_quality_checks: false
      log_role_swapping: false
      log_epoch_summary: true
      save_to_file: true
      log_filename: 'segment_filtering.log'

# -----------------------------------------------------------------------------
# Training Mode
# -----------------------------------------------------------------------------
full_finetuning: true

lora:
  enable: false
  rank: 64
  scaling: 2.0
  ft_embed: false

distributed_backend: fsdp

# -----------------------------------------------------------------------------
# Loss Configuration
# -----------------------------------------------------------------------------
first_codebook_weight_multiplier: 100.0
text_padding_weight: 0.5
user_semantic_weight: null
user_acoustic_weight: null
user_stream_loss_ratio: 0.0

# -----------------------------------------------------------------------------
# Sequence and Batch Configuration
# -----------------------------------------------------------------------------
# NOTE: Smaller batch size than HFLM due to larger model (7B vs 3B)
duration_sec: 10
batch_size: 4 # 32            # Reduced from 128 (Moshi 7B needs more memory)
num_microbatches: 8
max_steps: 3000
max_norm: 1.0
gradient_checkpointing: true

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
optim:
  lr: 3.0e-5              # Backbone learning rate
  depformer_lr: 6.0e-5    # DepFormer learning rate
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-5
  pct_start: 0.05

# -----------------------------------------------------------------------------
# Scheduler Configuration
# -----------------------------------------------------------------------------
scheduler:
  type: 'cosine_warmup'
  warmup_steps: 500
  min_lr: 1.0e-7
  t_0: 1000
  t_mult: 2

param_dtype: bfloat16

# -----------------------------------------------------------------------------
# Checkpointing Configuration
# -----------------------------------------------------------------------------
checkpoint:
  enabled: true
  name_prefix: 'checkpoint'
  metric_type: 'eval_loss'
  metric_best: 'min'
  resume_if_exist: true
  resume_from: null
  save_optimizer: true
  save_scheduler: true
  save_rng_state: true
  save_freq: 20
  max_keep: 15
  save_adapters_only: false
  save_dtype: 'bfloat16'

# Legacy options
seed: 42
log_freq: 20
eval_freq: 20
do_eval: true
eval_samples: 100
do_ckpt: false
ckpt_freq: 20
save_adapters: false
num_ckpt_keep: 10

run_dir: './runs/korean_moshi_stage1_pretrain_spk'
overwrite_run_dir: false

# -----------------------------------------------------------------------------
# STAGE-BASED PRETRAINED MODEL LOADING
# -----------------------------------------------------------------------------
# Load weights from a previous training stage while starting from step 0.
# This is useful for multi-stage training:
#   - Stage 1: Train base Korean model (without speaker conditioning)
#   - Stage 2: Load Stage 1 weights + add speaker conditioning (this config)
#
# When enabled:
#   - Loads matching parameters from the specified checkpoint
#   - New parameters (speaker_conditioner) keep their random initialization
#   - Training starts from step 0 with fresh optimizer/scheduler
#   - Checkpoint resume is automatically disabled
#
# Path options:
#   - "best": Auto-find best checkpoint in checkpoint_dir
#   - "last": Auto-find last checkpoint in checkpoint_dir
#   - Absolute path: "/path/to/checkpoint.safetensors"
#   - Relative path: "checkpoint.eval_loss-2.434.step-000880.safetensors"
# -----------------------------------------------------------------------------
pretrained:
  enabled: false                 # Disable for Stage 1 (train from scratch)
  # Uncomment below for Stage 2+ training:
  # path: "best"
  # checkpoint_dir: "./runs/korean_moshi_stage1_pretrain/checkpoints"
  # strict: false
  # expected_new_modules:
  #   - "speaker_conditioner"
  # verbose: true

# -----------------------------------------------------------------------------
# SPEAKER CONDITIONING CONFIGURATION (Zero-Shot Speaker Adaptation)
# -----------------------------------------------------------------------------
# This enables voice cloning from short reference audio during training.
# The model learns to reproduce speaker characteristics from reference clips.
#
# Methods:
#   - "encoder": Extract speaker embedding via sum_condition (Global Condition)
#   - "prompt": VALL-E style audio code prepending (Local Condition)
#   - "both": Combine encoder and prompt methods (RECOMMENDED)
#
# Encoder Options:
#   - ecapa_tdnn: SpeechBrain ECAPA-TDNN (192-dim)
#   - w2v_bert2: W2v-BERT 2.0 SV (256-dim, 0.14% EER SOTA) ← RECOMMENDED
#   - dummy: Testing without dependencies
#
# Download Guide: docs/W2V_BERT2_DOWNLOAD_GUIDE.md
# Architecture: docs/SPEAKER_CONDITIONING_ARCHITECTURE_DIAGRAM.md
# Audio Prompt Guide: docs/AUDIO_PROMPT_OPTIONS_GUIDE.md
# -----------------------------------------------------------------------------
speaker:
  enabled: true                    # Enable speaker conditioning
  method: "both"                   # "encoder" + "prompt" combined for best results

  # ==========================================================================
  # Speaker Encoder Configuration (W2v-BERT 2.0 SV - SOTA)
  # ==========================================================================
  # W2v-BERT 2.0 SV achieves 0.14% EER on VoxCeleb1-O (State-of-the-Art)
  # Paper: https://arxiv.org/abs/2510.04213
  # Model: https://huggingface.co/zl389/w2v-bert-2.0_SV
  # ==========================================================================
  encoder:
    encoder_type: "w2v_bert2"      # "ecapa_tdnn" | "w2v_bert2" | "dummy" | "custom"
    pretrained_path: "/path/to/model"
    freeze: true                   # Freeze encoder weights (recommended for stability)
    output_dim: 256                # 256 for w2v_bert2 (auto-set)
    sample_rate: 16000             # Input sample rate for encoder
    normalize_embedding: true      # L2 normalize output embeddings

    # W2v-BERT 2.0 specific settings
    w2v_bert2_n_mfa_layers: -1     # Number of layers for MFA (-1 = all 25 layers)
    w2v_bert2_pooling: "ASP"       # Attentive Statistics Pooling

  # ==========================================================================
  # Speaker Conditioner Configuration (Projection Layer)
  # ==========================================================================
  # Projects speaker embedding to Temporal Transformer hidden dimension
  # Applied via sum_condition: hidden_states = hidden_states + sum_condition
  # ==========================================================================
  conditioner:
    output_dim: 4096               # Must match Moshi Temporal TF hidden dim
    initial_scale: 0.1             # Small initial scale for stable training
    use_layernorm: true            # Apply LayerNorm after projection
    dropout: 0.0                   # Dropout probability (0.0 for stability)
    learnable_scale: true          # Make scale parameter learnable
    scale_mode: "multiply"         # "multiply" (scalar) or "gated" (element-wise sigmoid)

  # ==========================================================================
  # Reference Audio Sampler Configuration
  # ==========================================================================
  # Samples reference segments for speaker encoder input
  # Avoids overlap with training segment (avoid_overlap=true)
  # ==========================================================================
  reference_sampler:
    min_duration_sec: 3.0          # Minimum reference duration (10 seconds)
    max_duration_sec: 5.0          # Maximum reference duration (15 seconds)
    sample_rate: 24000             # Source audio sample rate (Mimi native)
    target_sample_rate: 16000      # Target sample rate for speaker encoder

  # ==========================================================================
  # Audio Prompting Configuration (VALL-E Style + PersonaPlex)
  # ==========================================================================
  # VALL-E Style: Prepend reference audio/text to main sequence
  # Mode "audio_text": Both audio codes AND text tokens (PersonaPlex style)
  # The prompt region is excluded from loss computation via prompt_mask
  # ==========================================================================
  audio_prompt:
    enable: true                   # Enable VALL-E style audio prompting
    mode: "audio_text"             # "audio_text" includes both audio + text tokens
    min_duration_sec: 10.0         # Minimum prompt duration (10 seconds)
    max_duration_sec: 15.0         # Maximum prompt duration (15 seconds)
    sample_strategy: "random"      # Random sampling from valid regions
    avoid_overlap: true            # Avoid sampling from training segment

# -----------------------------------------------------------------------------
# TensorBoard Logging
# -----------------------------------------------------------------------------
tensorboard:
  enabled: true
  log_histograms: true
  histogram_freq: 1
  log_gradients: true
  gradient_freq: 1
  log_memory: true
  log_per_codebook: true
  flush_secs: 30

# -----------------------------------------------------------------------------
# Weights & Biases (Optional)
# -----------------------------------------------------------------------------
wandb:
  project: 'k-moshi'
  run_name: 'k-moshi-stage1-pretrain'
  offline: true
  enabled: false

# -----------------------------------------------------------------------------
# Monitoring Configuration
# -----------------------------------------------------------------------------
monitoring:
  text_evaluation:
    enabled: true
    eval_freq: 20
    log_predictions: true
    max_prediction_samples: 3
    normalize_text: true

  codebook_analysis:
    enabled: true
    log_freq: 20
    log_usage_stats: true
    log_entropy: true

  gradient_monitoring:
    enabled: false
    log_freq: 20
    alert_on_nan: true
    alert_on_inf: true
    exploding_threshold: 100.0
    vanishing_threshold: 1.0e-7
    log_per_layer: false

  backbone_monitoring:
    enabled: false
    log_adapter_norms: false      # No adapter for Moshi
    log_backbone_activations: false
    compare_backbone_moshi: false

# -----------------------------------------------------------------------------
# Enhanced Evaluation
# -----------------------------------------------------------------------------
enhanced_evaluation:
  semantic:
    enabled: true
    compute_bleu: true
    compute_semantic: false
    max_samples: 20

  alignment:
    enabled: true
    tolerance_frames: 2

  dialogue:
    enabled: false
    overlap_threshold_frames: 3
    silence_threshold_frames: 25

  audio_quality:
    enabled: false
    compute_pesq: true
    compute_stoi: true
    compute_mcd: true
    max_samples: 3

# -----------------------------------------------------------------------------
# Sample Saving
# -----------------------------------------------------------------------------
sample_saving:
  enabled: true
  save_segment_samples: true
  save_dialogue_samples: false
  save_freq: 20
  max_samples_per_split: 25
  samples_per_save: 5
  max_dialogues_per_split: 5
  save_audio: true
  save_text: true
  audio_format: 'wav'
  sample_rate: 24000

# -----------------------------------------------------------------------------
# Research Logging
# -----------------------------------------------------------------------------
research_logging:
  enabled: true
  save_attention_maps: true
  attention_freq: 20
  attention_samples: 2
  save_raw_attention: false
  save_loss_curves: true
  save_codebook_stats: true
  save_gradient_norms: true
  generate_plots: true
  plot_freq: 20
  save_summary: true
